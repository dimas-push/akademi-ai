name: Auto Absen (Cron)

# Tiap 15 menit, Sen–Sab 06:00–22:00 WIB (UTC+7)
# UTC equivalent: 23:00 hari sebelumnya – 15:00 hari itu
on:
  schedule:
    - cron: '*/15 23 * * 0-5'   # 23:xx UTC = 06:xx WIB (mulai)
    - cron: '*/15 0-14 * * 1-6' # 00:xx–14:xx UTC = 07:xx–21:xx WIB

jobs:
  attend:
    runs-on: ubuntu-latest
    steps:
      - name: Panggil endpoint auto-absen
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "${{ secrets.SITE_URL }}/api/cron/auto-attend" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          echo "Status: $HTTP_STATUS"
          echo "Response: $BODY"
          # Gagal hanya jika HTTP error (5xx), bukan jika skip/non-JSON
          if [ "$HTTP_STATUS" -ge 500 ] 2>/dev/null; then
            echo "Server error!" && exit 1
          fi
