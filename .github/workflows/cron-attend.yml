name: Auto Absen (Cron)

# Sen–Jum 08:00–00:00 WIB (UTC+7)
# UTC equivalent: Sen–Jum 01:00–17:00 UTC
# (API handler tetap cek jam WIB sebagai safety net)
on:
  schedule:
    - cron: '*/15 1-16 * * 1-5'  # Mon-Fri 01:00-16:45 UTC = 08:00-23:45 WIB

jobs:
  attend:
    runs-on: ubuntu-latest
    steps:
      - name: Panggil endpoint auto-absen
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "${{ secrets.SITE_URL }}/api/cron/auto-attend" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          echo "Status: $HTTP_STATUS"
          echo "Response: $BODY"
          # Gagal hanya jika HTTP error (5xx)
          if [ "$HTTP_STATUS" -ge 500 ] 2>/dev/null; then
            echo "Server error!" && exit 1
          fi
